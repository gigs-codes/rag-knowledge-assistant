# Serves the built React app and proxies /api/* to the backend service —
# the production equivalent of vite.config.ts's dev-server proxy. Same
# reasoning: the browser only ever talks to one origin (this nginx),
# which forwards API calls internally over the docker-compose network,
# so there's no CORS configuration needed in production either.

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;  # SPA routing: unknown paths fall back to index.html
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
